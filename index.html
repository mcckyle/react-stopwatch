<!doctype html>
<html lang="en">
  <head>
    <!-- Document Setup. -->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <!-- Identity. -->
    <title>Precision Stopwatch</title>
    <meta name="application-name" content="Precision Stopwatch" />
    <meta
      name="description"
      content="A precise, modern stopwatch built with React and Vite."
    />
    <meta name="format-detection" content="telephone=no" />

    <!-- Theme (Bias initial render toward dark-first experience). -->
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f4f7fb" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0b1016" />

    <!-- PWA. -->
    <link rel="manifest" href="/react-stopwatch/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Precision Stopwatch" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Fonts. -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Icons. -->
    <link rel="icon" href="/react-stopwatch/images/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/react-stopwatch/images/favicon.png" sizes="180x180" />

    <!-- Prevent White Flash Before CSS Loads. -->
    <style>html { background: #0b1016; color-scheme: dark; } body { margin: 0; background: #0b1016; color: #f5f7fa; }</style>
    <script type="module" crossorigin src="/react-stopwatch/assets/index-DAFNwxnV.js"></script>
    <link rel="stylesheet" crossorigin href="/react-stopwatch/assets/index-DISw8ZKM.css">
  </head>
  <body>
    <noscript>
      <div class="noscript-message" role="alert" aria-live="assertive">
        JavaScript is required to run this application!
      </div>
    </noscript>
    <div id="root"></div>
  </body>
</html>
