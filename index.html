<!doctype html>
<html lang="en" class="light">
  <head>
    <!-- Document Setup. -->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <!-- Identity. -->
    <title>Precision Stopwatch</title>
    <meta name="application-name" content="Precision Stopwatch" />
    <meta
      name="description"
      content="A precise, modern stopwatch built with React and Vite."
    />
    <meta name="format-detection" content="telephone=no" />

    <!-- Theme. -->
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0f14" media="(prefers-color-scheme: dark)" />

    <!-- PWA. -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Stopwatch" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- External Fonts Imports. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Icons. -->
    <link rel="icon" href="/images/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/images/favicon.png" sizes="180x180" />
  </head>
  <body>
    <noscript>
      <div class="noscript-message" role="alert">
        JavaScript is required to run this application!
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
